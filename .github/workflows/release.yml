name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Decide next action
        id: decide
        shell: pwsh
        run: |
          $csprojPath = "TarkovRichPresence.csproj"
          [xml]$csproj = Get-Content $csprojPath
          $currentVersion = [Version](($csproj.Project.PropertyGroup.Version -split '-')[0])

          $tagVersions = git tag --list |
            Where-Object { $_ -match '^\d+\.\d+\.\d+$' } |
            ForEach-Object { [Version]$_ } |
            Sort-Object -Descending

          $latestTag = if ($tagVersions) { $tagVersions[0] } else { [Version]"0.0.0" }

          Write-Host "Current csproj version: $currentVersion"
          Write-Host "Latest released tag: $latestTag"

          if ($currentVersion -gt $latestTag) {
            # csproj already carries an unreleased version (a bump PR was just merged) -> cut a release
            echo "action=release" >> $env:GITHUB_OUTPUT
            echo "version=$currentVersion" >> $env:GITHUB_OUTPUT
          } else {
            # csproj version matches the latest release -> propose the next bump via PR
            $major = $currentVersion.Major
            $minor = $currentVersion.Minor
            $patch = $currentVersion.Build + 1
            $newVersion = "$major.$minor.$patch"
            echo "action=bump-pr" >> $env:GITHUB_OUTPUT
            echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          }

      - name: Update csproj version
        if: steps.decide.outputs.action == 'bump-pr'
        shell: pwsh
        run: |
          $csprojPath = "TarkovRichPresence.csproj"
          [xml]$csproj = Get-Content $csprojPath
          $csproj.Project.PropertyGroup.Version = "${{ steps.decide.outputs.version }}"
          $csproj.Save($csprojPath)

      - name: Open version bump PR
        if: steps.decide.outputs.action == 'bump-pr'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.decide.outputs.version }}"
          title: "chore: bump version to ${{ steps.decide.outputs.version }}"
          body: "Automated version bump to `${{ steps.decide.outputs.version }}`. Merging this will cut a new release."
          branch: "release/bump-version-${{ steps.decide.outputs.version }}"
          base: main
          add-paths: TarkovRichPresence.csproj

      - name: Tag release
        if: steps.decide.outputs.action == 'release'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.decide.outputs.version }}"
          git push origin "${{ steps.decide.outputs.version }}"

      - name: Publish executable
        if: steps.decide.outputs.action == 'release'
        shell: pwsh
        run: |
          dotnet publish TarkovRichPresence.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.decide.outputs.version }} `
            -o publish

      - name: Rename executable
        if: steps.decide.outputs.action == 'release'
        shell: pwsh
        run: |
          Copy-Item "publish/TarkovRichPresence.exe" "TarkovRichPresence-${{ steps.decide.outputs.version }}.exe"

      - name: Create GitHub release
        if: steps.decide.outputs.action == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.decide.outputs.version }}
          name: ${{ steps.decide.outputs.version }}
          generate_release_notes: true
          files: TarkovRichPresence-${{ steps.decide.outputs.version }}.exe
